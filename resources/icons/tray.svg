<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- Keyboard body - clean rounded rect, hairline stroke -->
  <rect x="1.5" y="4.5" width="19" height="13" rx="2.5" ry="2.5"
        fill="none" stroke="#000" stroke-width="1.4"/>

  <!-- Row 1: 5 keys -->
  <rect x="3"   y="6.8" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="6.4" y="6.8" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="9.8" y="6.8" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="13.2" y="6.8" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="16.6" y="6.8" width="1.9" height="1.9" rx="0.45" fill="#000"/>

  <!-- Row 2: 4 keys + tall enter -->
  <rect x="3.5"  y="9.6" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="6.9"  y="9.6" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="10.3" y="9.6" width="2.4" height="1.9" rx="0.45" fill="#000"/>
  <rect x="13.7" y="9.6" width="2.4" height="1.9" rx="0.45" fill="#000"/>

  <!-- Spacebar -->
  <rect x="5.5" y="12.6" width="11" height="1.8" rx="0.6" fill="#000"/>
</svg>
